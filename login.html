<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – MyApp</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0f1a;
      --card: #141929;
      --border: #1e2a42;
      --accent: #4f8ef7;
      --accent2: #7c3aed;
      --text: #e8edf5;
      --muted: #7a8499;
      --error: #f87171;
      --radius: 14px;
    }

    body {
      font-family: 'Sora', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Animated background blobs */
    .bg-blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      animation: float 8s ease-in-out infinite;
      pointer-events: none;
    }
    .bg-blob.b1 { width: 420px; height: 420px; background: var(--accent); top: -100px; left: -100px; animation-delay: 0s; }
    .bg-blob.b2 { width: 320px; height: 320px; background: var(--accent2); bottom: -80px; right: -80px; animation-delay: 3s; }
    .bg-blob.b3 { width: 200px; height: 200px; background: #0ea5e9; top: 50%; left: 50%; animation-delay: 5s; }

    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-30px) scale(1.05); }
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 44px 40px;
      width: 100%;
      max-width: 420px;
      position: relative;
      box-shadow: 0 25px 60px rgba(0,0,0,0.5);
      animation: slideUp 0.5s ease both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }
    .logo-icon {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .logo-text { font-weight: 700; font-size: 1.2rem; letter-spacing: -0.5px; }

    h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 6px; letter-spacing: -0.5px; }
    .subtitle { color: var(--muted); font-size: 0.875rem; margin-bottom: 32px; }

    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--muted); margin-bottom: 7px; letter-spacing: 0.5px; text-transform: uppercase; }

    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 13px 16px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,142,247,0.15); }
    input.error { border-color: var(--error); }

    .error-msg { color: var(--error); font-size: 0.78rem; margin-top: 5px; display: none; }
    .error-msg.show { display: block; }

    .forgot { text-align: right; margin-top: -10px; margin-bottom: 18px; }
    .forgot a { color: var(--accent); font-size: 0.8rem; text-decoration: none; }
    .forgot a:hover { text-decoration: underline; }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 9px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-bottom: 20px;
    }
    .btn:hover { opacity: 0.9; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .divider { display: flex; align-items: center; gap: 12px; color: var(--muted); font-size: 0.8rem; margin-bottom: 18px; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .social-btn {
      width: 100%;
      padding: 12px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 9px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      margin-bottom: 10px;
      transition: background 0.2s, border-color 0.2s;
      text-decoration: none;
    }
    .social-btn:hover { background: var(--border); border-color: #2e3f5c; }
    .social-btn img { width: 18px; height: 18px; }

    .register { text-align: center; font-size: 0.85rem; color: var(--muted); margin-top: 8px; }
    .register a { color: var(--accent); text-decoration: none; font-weight: 600; }

    /* Success state */
    .success-overlay {
      display: none;
      position: absolute; inset: 0;
      background: var(--card);
      border-radius: var(--radius);
      align-items: center; justify-content: center;
      flex-direction: column; gap: 16px;
      animation: fadeIn 0.3s ease;
    }
    .success-overlay.show { display: flex; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .check { font-size: 3rem; }
    .success-overlay h2 { font-size: 1.3rem; }
    .success-overlay p { color: var(--muted); font-size: 0.875rem; }
    .goto-btn {
      padding: 12px 28px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: 9px;
      color: #fff; font-family: inherit; font-weight: 600;
      cursor: pointer; font-size: 0.9rem;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <!-- Background blobs -->
  <div class="bg-blob b1"></div>
  <div class="bg-blob b2"></div>
  <div class="bg-blob b3"></div>

  <div class="card">
    <div class="logo">
      <div class="logo-icon">🌐</div>
      <span class="logo-text">MyApp</span>
    </div>

    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to continue to your dashboard.</p>

    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
      <div class="error-msg" id="email-error">Please enter a valid email.</div>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
      <div class="error-msg" id="pass-error">Password must be at least 6 characters.</div>
    </div>

    <div class="forgot"><a href="#">Forgot password?</a></div>

    <button class="btn" id="login-btn" onclick="handleLogin()">Sign In</button>

    <div class="divider">or continue with</div>

    <a href="#" class="social-btn">
      <!-- Google icon inline SVG -->
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>
      Sign in with Google
    </a>

    <div class="register">Don't have an account? <a href="#">Sign up</a></div>

    <!-- Success Overlay -->
    <div class="success-overlay" id="success">
      <div class="check">✅</div>
      <h2>Signed in!</h2>
      <p>Redirecting you to the dashboard…</p>
      <a href="dashboard.html" class="goto-btn">Go to Dashboard →</a>
    </div>
  </div>

  <script>
    function handleLogin() {
      const email = document.getElementById('email');
      const password = document.getElementById('password');
      const emailErr = document.getElementById('email-error');
      const passErr = document.getElementById('pass-error');
      let valid = true;

      // Reset
      email.classList.remove('error');
      password.classList.remove('error');
      emailErr.classList.remove('show');
      passErr.classList.remove('show');

      // Validate email
      if (!email.value || !/\S+@\S+\.\S+/.test(email.value)) {
        email.classList.add('error');
        emailErr.classList.add('show');
        valid = false;
      }

      // Validate password
      if (!password.value || password.value.length < 6) {
        password.classList.add('error');
        passErr.classList.add('show');
        valid = false;
      }

      if (valid) {
        const btn = document.getElementById('login-btn');
        btn.textContent = 'Signing in…';
        btn.disabled = true;
        // Simulate network request
        setTimeout(() => {
          document.getElementById('success').classList.add('show');
        }, 1200);
      }
    }

    // Allow Enter key
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });
  </script>
</body>
</html>
